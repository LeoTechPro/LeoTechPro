services:
  web:
    build:
      context: ..
      dockerfile: hecs-deploy/Dockerfile
    container_name: hecs-web
    env_file:
      - .env
    ports:
      - "127.0.0.1:18080:8000"
    volumes:
      - ./runtime/data:/app/data
      - ./runtime/staticfiles:/app/staticfiles
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
