upstream hecs_upstream {
    server 127.0.0.1:18080;
    keepalive 16;
}

server {
    listen 80;
    server_name hecs.intdata.pro;

    # certbot will manage this file and add HTTPS redirect/certs.

    location /static/ {
        alias /opt/hecs/hecs-deploy/runtime/staticfiles/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    location ^~ /admin/ {
        auth_basic "Restricted Admin";
        auth_basic_user_file /etc/nginx/.htpasswd-hecs-admin;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://hecs_upstream;
    }

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_pass http://hecs_upstream;
    }
}
